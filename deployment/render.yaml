services:
  - type: web
    name: ai-news-backend
    runtime: docker
    plan: free
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-news-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: ai-news-redis
          property: connectionString
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: REDDIT_CLIENT_ID
        sync: false
      - key: REDDIT_CLIENT_SECRET
        sync: false
      - key: GITHUB_TOKEN
        sync: false

  - type: web
    name: ai-news-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_BASE
        value: https://ai-news-backend.onrender.com

  - type: redis
    name: ai-news-redis
    plan: free
    ipAllowList: []

databases:
  - name: ai-news-postgres
    plan: free
    databaseName: ai_news
    user: ai_news
